name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS arm64
          - os: macos-latest
            arch: arm64
            artifact: lark-acp-macos-arm64

          # macOS x86_64
          - os: macos-13
            arch: x64
            artifact: lark-acp-macos-x86_64

          # Linux x86_64
          - os: ubuntu-latest
            arch: x64
            artifact: lark-acp-linux-x86_64

          # Windows x86_64
          - os: windows-latest
            arch: x64
            artifact: lark-acp.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bun run typecheck

      - name: Run lint
        run: bun run check

      - name: Build binary
        run: bun run build

      - name: Rename binary for artifact
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp dist/lark-acp.exe ${{ matrix.artifact }}
          else
            cp dist/lark-acp ${{ matrix.artifact }}
            chmod +x ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
